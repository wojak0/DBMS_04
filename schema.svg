@startuml

entity customer {
    <b><color:gold>PK</color></b> cust_no    : INTEGER
    - -
    cust_name     : TEXT
    cust_city     : TEXT
}

entity vehicle {
    <b><color:gold>PK</color></b> plate      : TEXT
    - -
    <i><color:gray>FK</color></i> cust_no    : INTEGER
    make          : TEXT
    model         : TEXT
    year          : INTEGER
}

entity mechanic {
    <b><color:gold>PK</color></b> mech_id    : INTEGER
    - -
    mech_name     : TEXT
    hourly_rate   : REAL
}

entity order {
    <b><color:gold>PK</color></b> order_no   : INTEGER
    - -
    <i><color:gray>FK</color></i> plate      : TEXT
    <i><color:gray>FK</color></i> cust_no    : INTEGER
    date          : DATE
}

entity work_item {
    <b><color:gold>PK</color></b> <i><color:gray>FK</color></i> order_no : INTEGER
    <b><color:gold>PK</color></b> item_no     : INTEGER
    - -
    <i><color:gray>FK</color></i> mech_id     : INTEGER
    description    : TEXT
    hours          : REAL
}

customer ||- -o{ vehicle   : "owns"
customer ||- -o{ order     : "places"
vehicle  ||- -o{ order     : "undergoes"
order    ||- -|{ work_item : "contains"
mechanic ||- -o{ work_item : "performs"
@enduml

